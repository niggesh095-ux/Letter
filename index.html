<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Romantic Bollywood Melody Letter</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --fancy-font: 'Sacramento', cursive;
            --body-font: 'Quicksand', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe6eb 0%, #f3e8ff 100%);
            font-family: var(--body-font);
            overflow: hidden;
        }

        .fancy-title {
            font-family: var(--fancy-font);
        }

        /* Ambient Twinkling Stars */
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: twinkle 3s infinite ease-in-out;
            opacity: 0.3;
        }
        @keyframes twinkle {
            0%, 100% { transform: scale(0.3); opacity: 0.2; }
            50% { transform: scale(1.2); opacity: 0.8; filter: drop-shadow(0 0 8px #fff); }
        }

        /* Background Floating Items styling */
        .floating-item {
            position: absolute;
            user-select: none;
            cursor: pointer;
            animation: floatSkew 5s ease-in-out infinite alternate;
            transition: transform 0.2s ease;
        }
        .floating-item:hover {
            transform: scale(1.3) !important;
        }
        @keyframes floatSkew {
            0% { transform: translateY(0px) translateX(0px) rotate(0deg); }
            100% { transform: translateY(-25px) translateX(10px) rotate(12deg); }
        }

        /* Pulsing Heart Button */
        .heart-btn {
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: heartBeat 2s infinite;
        }
        .heart-btn:hover {
            transform: scale(1.2) rotate(5deg);
            filter: drop-shadow(0 0 25px #ff69b4);
        }
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        .heart-disappear {
            transform: scale(0) rotate(-45deg);
            opacity: 0;
            pointer-events: none;
        }

        /* RESPONSIVE 3D ENVELOPE STRUCTURAL LAYOUT */
        .envelope-wrapper {
            position: relative;
            height: 280px;
            background-color: #1a1528;
            border-radius: 0 0 15px 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 25px rgba(168, 85, 247, 0.3);
            border: 2px solid rgba(168, 85, 247, 0.4);
            transform: scale(0);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @media (min-width: 640px) {
            .envelope-wrapper { height: 300px; }
        }
        .envelope-wrapper.reveal {
            transform: scale(1);
            opacity: 1;
        }

        /* Envelope triangular flap */
        .envelope-flap {
            position: absolute;
            top: -2px;
            left: -2px;
            width: calc(100% + 4px);
            height: 100%;
            background-color: #241d38;
            clip-path: polygon(0% 0%, 50% 55%, 100% 0%);
            border-radius: 15px 15px 0 0;
            transform-origin: top;
            transition: transform 0.6s ease-in-out;
            z-index: 30;
            border-top: 2px solid rgba(192, 132, 252, 0.5);
        }
        .envelope-wrapper.open .envelope-flap {
            transform: rotateX(180deg) translateY(2px);
            z-index: 5;
        }

        /* Wax Seal Button */
        .wax-seal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -40%) scale(1);
            z-index: 35;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .wax-seal:hover {
            transform: translate(-50%, -40%) scale(1.15);
            filter: drop-shadow(0 0 15px #c084fc);
        }
        .envelope-wrapper.open .wax-seal {
            transform: translate(-50%, -40%) scale(0);
            opacity: 0;
            pointer-events: none;
        }

        /* ADVANCED LETTER MASTER BOX */
        .letter-box {
            background-color: #000000;
            border: 2px solid rgba(192, 132, 252, 0.8);
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.5), 
                        inset 0 0 25px rgba(168, 85, 247, 0.25);
            backdrop-filter: blur(5px);
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.8s ease, top 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            animation: boxGlow 4s ease-in-out infinite alternate;
        }
        @keyframes boxGlow {
            0% { box-shadow: 0 0 30px rgba(168, 85, 247, 0.4); }
            100% { box-shadow: 0 0 50px rgba(232, 121, 249, 0.7); }
        }

        /* Hidden inside envelope properties */
        #letterContainer.in-envelope {
            position: absolute;
            top: 10px;
            left: 5%;
            width: 90%;
            height: 90%;
            z-index: 10;
            transform: scale(0.95);
            pointer-events: none;
            opacity: 0;
        }
        /* Slid out state */
        #letterContainer.slid-out {
            position: relative;
            width: 100%;
            height: auto;
            z-index: 40;
            transform: scale(1);
            pointer-events: auto;
            opacity: 1;
        }

        /* Floating Petals Container */
        .petal-container {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            border-radius: 24px;
        }
        .internal-petal {
            position: absolute;
            background: radial-gradient(circle, rgba(232,121,249,0.4) 0%, rgba(168,85,247,0.1) 70%);
            border-radius: 50% 0 50% 50%;
            animation: fallPetal 6s linear infinite;
        }
        @keyframes fallPetal {
            0% { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.4; }
            100% { transform: translateY(450px) translateX(80px) rotate(360deg); opacity: 0; }
        }

        /* Custom Scrollbar for letter content */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: rgba(168, 85, 247, 0.05);
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(168, 85, 247, 0.4);
            border-radius: 10px;
        }

        /* Fluid Page Swipe Transition */
        .page-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #d8b4fe, #f472b6);
            transform: translateY(100%);
            transition: transform 0.7s cubic-bezier(0.76, 0, 0.24, 1);
            z-index: 90;
            pointer-events: none;
        }
        .page-transition.active {
            transform: translateY(0);
        }

        /* Active Flying Transition Flight Sparkles */
        .burst-particle {
            position: fixed;
            pointer-events: none;
            z-index: 95;
            border-radius: 50%;
            background: white;
            box-shadow: 0 0 10px #fff, 0 0 20px #f472b6, 0 0 30px #c084fc;
            animation: flySparkle 0.8s forwards cubic-bezier(0.25, 1, 0.5, 1);
        }
        @keyframes flySparkle {
            0% { transform: translate(0, 0) scale(1.5); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; }
        }

        /* DYNAMIC RESPONSIVE PLAYLIST BAR */
        .music-player-top {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(10, 5, 20, 0.96);
            border: 2px solid #c084fc;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.6);
            width: 92%;
            max-width: 780px;
        }
        @media (min-width: 768px) {
            .music-player-top { top: 15px; width: 95%; }
        }

        .mini-vinyl {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #f472b6 20%, #222 25%, #000 70%);
            border-radius: 50%;
            animation: spin 3s linear infinite;
            animation-play-state: paused;
            flex-shrink: 0;
        }
        @media (min-width: 768px) {
            .mini-vinyl { width: 44px; height: 44px; }
        }
        .mini-vinyl.playing {
            animation-play-state: running;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        
        .track-link-item {
            transition: all 0.3s ease;
        }
        .track-link-item.active-track {
            color: #f472b6;
            text-shadow: 0 0 10px rgba(244, 114, 182, 0.8);
            font-weight: 700;
        }
    </style>
</head>

        };

        const bollywoodPlaylist = [
            { src: "Samjhawan Humpty Sharma Ki Dulhania 320 Kbps.mp3" },
            { src: "Likhe Jo Khat Tujhe Kanyadaan 320 Kbps.mp3" }, 
            { src: "Pal Pal Dil Ke Paas_320(KoshalWorld.Com).mp3" },
            { src: "Abhi Mujh Mein Kahin Agneepath 320 Kbps.mp3" },
            { src: "Mast Magan 2 States 320 Kbps.mp3" },
            { src: "Rang Jo Lagyo Ramaiya Vastavaiya 320 Kbps.mp3" }
        ];

        let currentTrackIndex = 0;

        const heartBtn = document.getElementById('heartBtn');
        const envelope = document.getElementById('envelope');
        const waxSeal = document.getElementById('waxSeal');
        const letterContainer = document.getElementById('letterContainer');
        const swipeOverlay = document.getElementById('swipeOverlay');
        const sparkleLayer = document.getElementById('sparkleLayer');
        
        // Music UI Elements
        const bgMusic = document.getElementById('bgMusic');
        const vinylIcon = document.getElementById('vinylIcon');
        const musicToggleBtn = document.getElementById('musicToggleBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const trackLinks = document.querySelectorAll('.track-link-item');

        let typewriterTimers = [];

        // Load Initial Target Track
        function loadTrack(index) {
            currentTrackIndex = index;
            bgMusic.src = bollywoodPlaylist[index].src;
            
            // Highlight current text link in the bar menu
            trackLinks.forEach((link, idx) => {
                if(idx === index) {
                    link.classList.add('active-track');
                } else {
                    link.classList.remove('active-track');
                }
            });
        }

        function playTrack() {
            bgMusic.play().catch(e => {
                console.log("Audio playback held or file link missing.");
                musicToggleBtn.textContent = "PLAY";
                vinylIcon.classList.remove('playing');
            });
            vinylIcon.classList.add('playing');
            musicToggleBtn.textContent = "PAUSE";
        }

        function pauseTrack() {
            bgMusic.pause();
            vinylIcon.classList.remove('playing');
            musicToggleBtn.textContent = "PLAY";
        }

        musicToggleBtn.addEventListener('click', () => {
            if (bgMusic.paused) {
                if(!bgMusic.src) loadTrack(0);
                playTrack();
            } else {
                pauseTrack();
            }
        });

        prevBtn.addEventListener('click', () => {
            let prevIndex = currentTrackIndex - 1;
            if (prevIndex < 0) prevIndex = bollywoodPlaylist.length - 1;
            loadTrack(prevIndex);
            playTrack();
        });

        nextBtn.addEventListener('click', () => {
            let nextIndex = currentTrackIndex + 1;
            if (nextIndex >= bollywoodPlaylist.length) nextIndex = 0;
            loadTrack(nextIndex);
            playTrack();
        });

        // Click directly on song names inside the bar to switch tracks
        trackLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                const targetIndex = parseInt(e.target.getAttribute('data-index'));
                loadTrack(targetIndex);
                playTrack();
            });
        });

        // Track rotation loop hook
        bgMusic.addEventListener('ended', () => {
            let nextIndex = currentTrackIndex + 1;
            if (nextIndex >= bollywoodPlaylist.length) nextIndex = 0;
            loadTrack(nextIndex);
            playTrack();
        });

        // Ambient Sparkles Underlay
        function createAmbientSparkles() {
            const count = window.innerWidth < 640 ? 20 : 40; 
            for (let i = 0; i < count; i++) {
                const sparkle = document.createElement('div');
                sparkle.classList.add('sparkle');
                const size = Math.random() * 4 + 2;
                sparkle.style.width = `${size}px`;
                sparkle.style.height = `${size}px`;
                sparkle.style.top = `${Math.random() * 100}%`;
                sparkle.style.left = `${Math.random() * 100}%`;
                sparkle.style.animationDelay = `${Math.random() * 3}s`;
                sparkle.style.animationDuration = `${Math.random() * 3 + 2}s`;
                sparkleLayer.appendChild(sparkle);
            }
        }
        createAmbientSparkles();

        // Interior Petal Drift Generation Engine
        function injectPetals() {
            document.querySelectorAll('.petal-container').forEach(container => {
                container.innerHTML = ''; 
                const count = window.innerWidth < 640 ? 5 : 8;
                for(let i=0; i < count; i++) {
                    const petal = document.createElement('div');
                    petal.classList.add('internal-petal');
                    const size = Math.random() * 10 + 5;
                    petal.style.width = `${size}px`;
                    petal.style.height = `${size}px`;
                    petal.style.left = `${Math.random() * 90}%`;
                    petal.style.animationDelay = `${Math.random() * 5}s`;
                    petal.style.animationDuration = `${Math.random() * 4 + 4}s`;
                    container.appendChild(petal);
                }
            });
        }

        // Heart click displays envelope AND triggers 'Likhe Jo Khat Tujhe'
        heartBtn.addEventListener('click', () => {
            heartBtn.classList.add('heart-disappear');
            
            loadTrack(1); 
            playTrack();

            setTimeout(() => {
                heartBtn.classList.add('hidden');
                envelope.classList.remove('hidden');
                void envelope.offsetWidth;
                envelope.classList.add('reveal');
            }, 600);
        });

        // Wax seal opens letter
        waxSeal.addEventListener('click', () => {
            envelope.classList.add('open');

            setTimeout(() => {
                letterContainer.classList.remove('hidden');
                void letterContainer.offsetWidth;
                
                envelope.classList.add('hidden');
                letterContainer.classList.remove('in-envelope');
                letterContainer.classList.add('slid-out');
                
                injectPetals();
                runTypewriterSystem(1);
            }, 800);
        });

        // Typewriter Assembly Printer Engine
        function runTypewriterSystem(pageNumber) {
            typewriterTimers.forEach(clearTimeout);
            typewriterTimers = [];

            const runPrinter = (elementId, fullText, startDelay, callback) => {
                const element = document.getElementById(elementId);
                if(!element) return;
                element.innerHTML = '';
                let index = 0;

                const timerId = setTimeout(() => {
                    function drawChar() {
                        if (index < fullText.length) {
                            element.innerHTML += fullText.charAt(index);
                            index++;
                            const nextTimer = setTimeout(drawChar, 18); 
                            typewriterTimers.push(nextTimer);
                        } else if(callback) {
                            callback();
                        }
                    }
                    drawChar();
                }, startDelay);
                typewriterTimers.push(timerId);
            };

            if(pageNumber === 1) {
                runPrinter('textBlock1', textContent.block1, 200, () => {
                    runPrinter('textBlock2', textContent.block2, 100);
                });
            } else if(pageNumber === 2) {
                runPrinter('textBlock3', textContent.block3, 200, () => {
                    runPrinter('textBlock4', textContent.block4, 100);
                });
            }
        }

        // Interactive Clicking Explosion Burst
        document.body.addEventListener('click', (e) => {
            if (!e.target.classList.contains('floating-item')) return;
            
            const count = 8;
            for (let i = 0; i < count; i++) {
                const burst = document.createElement('div');
                burst.classList.add('burst-particle');
                burst.style.left = `${e.clientX}px`;
                burst.style.top = `${e.clientY}px`;
                burst.style.width = '5px';
                burst.style.height = '5px';

                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 60 + 20;
                const mx = Math.cos(angle) * distance;
                const my = Math.sin(angle) * distance;

                burst.style.setProperty('--mx', `${mx}px`);
                burst.style.setProperty('--my', `${my}px`);
                document.body.appendChild(burst);
                setTimeout(() => burst.remove(), 800);
            }
        });

        // Magical Flight Transition Trail Sparks Array
        function triggerTransitionSparkles() {
            const particleCount = window.innerWidth < 640 ? 25 : 45; 
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;

            for (let i = 0; i < particleCount; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.classList.add('burst-particle');
                    p.style.left = `${Math.random() * screenWidth}px`;
                    p.style.top = `${screenHeight + 50}px`;

                    const size = Math.random() * 6 + 3;
                    p.style.width = `${size}px`;
                    p.style.height = `${size}px`;

                    p.style.setProperty('--mx', `${(Math.random() - 0.5) * 200}px`);
                    p.style.setProperty('--my', `${-(Math.random() * screenHeight + 150)}px`);

                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 800);
                }, i * 10);
            }
        }

        // Smooth Page Swapping Execution Logic
        function navigateToPage(currentPageId, nextPageId) {
            const current = document.getElementById(currentPageId);
            const next = document.getElementById(nextPageId);

            triggerTransitionSparkles();
            swipeOverlay.classList.add('active');

            setTimeout(() => {
                current.classList.add('hidden');
                next.classList.remove('hidden');
                
                injectPetals();

                if(nextPageId === 'page1') {
                    letterContainer.classList.remove('hidden', 'in-envelope');
                    letterContainer.classList.add('slid-out');
                    heartBtn.classList.add('hidden');
                    envelope.classList.add('hidden');
                    runTypewriterSystem(1);
                } else {
                    runTypewriterSystem(2);
                }
                
                swipeOverlay.classList.remove('active');
            }, 650);
        }

        // Mouse Pointer Parallax Tilt Engine
        if (window.matchMedia("(min-width: 1024px)").matches) {
            document.addEventListener('mousemove', (e) => {
                const boxes = document.querySelectorAll('.letter-box:not(.hidden)');
                if(boxes.length === 0) return;
                
                const xAxis = (window.innerWidth / 2 - e.pageX) / 75;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 75;
                
                boxes.forEach(box => {
                    box.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
                });
            });
        }
    </script>
</body>
</html>
